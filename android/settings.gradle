pluginManagement {
    def localPropertiesFile = new File(settingsDir, "local.properties")
    def flutterSdkPath = null
    if (localPropertiesFile.exists()) {
        def properties = new Properties()
        localPropertiesFile.withInputStream { properties.load(it) }
        flutterSdkPath = properties.getProperty("flutter.sdk")
    }
    if (flutterSdkPath == null) {
        flutterSdkPath = System.getenv("FLUTTER_ROOT")
            ?: (System.getProperty("user.home") + File.separator + "flutter")
    }
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.0" apply false
}

include ":app"
