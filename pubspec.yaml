name: rainbow_cloud
description: 彩虹外链网盘客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  file_picker: ^10.1.0
  path_provider: ^2.1.1
  cached_network_image: ^3.3.1
  crypto: ^3.0.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.7.5
  photo_view: ^0.15.0
  url_launcher: ^6.2.4
  open_file: ^3.3.2
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  device_info_plus: ^9.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
