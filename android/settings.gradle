pluginManagement {
    def flutterSdkPath = {
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }
        def flutterSdkPath = localProperties.getProperty('flutter.sdk')
        if (flutterSdkPath == null) {
            flutterSdkPath = System.env.FLUTTER_ROOT
        }
        if (flutterSdkPath == null) {
            flutterSdkPath = '../../flutter'
        }
        if (flutterSdkPath == null) {
            def flutter = Os.isFamily(Os.FAMILY_WINDOWS) ? 'flutter.bat' : 'flutter'
            def stdout = new ByteArrayOutputStream()
            exec {
                commandLine flutter, '--version'
                standardOutput = stdout
            }
            flutterSdkPath = stdout.toString().split('\n')[0].trim().replaceAll('Flutter SDK at: ', '')
        }
        return flutterSdkPath
    }()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
